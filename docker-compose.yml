version: "3.9"

services:

  postgres:
    image: postgres:16

    container_name: resumeos-postgres

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: resumeos

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

    container_name: resumeos-redis

    restart: always

    ports:
      - "6379:6379"

volumes:
  postgres_data: